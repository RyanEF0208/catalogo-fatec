<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Histórico de Produtos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-dark text-white">
            <h3>Histórico de Atualizações</h3>
        </div>

        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID Produto</th>
                    <th>Usuário</th>
                    <th>Ação</th>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Estoque Baixo</th>
                    <th>Data</th>
                </tr>
                </thead>
                <tbody>
                <tr th:classappend="${a.estoqueBaixo}? 'table-danger'" th:each="a : ${auditorias}">
                    <td th:text="${a.idProduto}"></td>
                    <td th:text="${a.usuario}"></td>
                    <td>
                        <span class="badge" th:classappend="${a.acao == 'CREATE'} ? 'bg-success' :
                      (${a.acao == 'UPDATE'} ? 'bg-warning' : 'bg-danger')" th:text="${a.acao}"></span>
                    </td>
                    <td th:text="${a.produto}"></td>
                    <td th:text="${a.quantidade}"></td>
                    <td>
                        <span class="badge bg-danger" th:if="${a.estoqueBaixo}">SIM</span>
                        <span class="badge bg-success" th:unless="${a.estoqueBaixo}">NÃO</span>
                    </td>
                    <td th:text="${#temporals.format(a.data,'dd/MM/yyyy HH:mm')}"></td>
                </tr>
                </tbody>
            </table>
            <a class="btn btn-secondary" th:href="@{/produtos}">Voltar</a>
        </div>
    </div>
</div>

</body>
</html>
