<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/produtos">
            FATEC - Catálogo
        </a>
    </div>
</nav>

<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-white">
            <h2 class="mb-0">Editar Produto</h2>
        </div>
        <div class="card-body">
            <form id="formEditar" th:action="@{/produtos/editar/{id}(id=${produto.idProduto})}" th:object="${produto}"
                  method="post">

                <input type="hidden" th:field="*{idProduto}">

                <div class="mb-3">
                    <label class="form-label">Nome do Produto</label>
                    <input type="text" th:field="*{nome}" class="form-control" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Preço (R$)</label>
                    <input type="number" step="0.01" th:field="*{valor}" class="form-control" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantidade</label>

                    <input type="number"
                           th:field="*{quantidade}"
                           class="form-control">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('quantidade')}"
                         th:errors="*{quantidade}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Categoria</label>
                    <select name="categoria.idCategoria"
                            class="form-select"
                            required>
                        <option th:each="cat : ${categorias}"
                                th:value="${cat.idCategoria}"
                                th:text="${cat.nome}"
                                th:selected="${produto.categoria != null and produto.categoria.idCategoria == cat.idCategoria}">
                        </option>
                    </select>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/produtos}" class="btn btn-secondary">Cancelar</a>
                    <button
                            type="button"
                            class="btn btn-warning"
                            data-bs-toggle="modal"
                            data-bs-target="#modalEditar">
                        Salvar
                    </button>
                </div>
            </form>
            <div class="modal fade" id="modalEditar">
                <div class="modal-dialog">
                    <div class="modal-content">

                        <div class="modal-body">
                            Tem certeza que deseja editar?
                        </div>

                        <div class="modal-footer">
                            <button
                                    type="button"
                                    class="btn btn-secondary"
                                    data-bs-dismiss="modal">
                                Cancelar
                            </button>

                            <button
                                    type="button"
                                    class="btn btn-primary"
                                    onclick="document.getElementById('formEditar').submit();">
                                Confirmar
                            </button>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
