<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security>">
<head>
    <meta charset="UTF-8">
    <title>Lista de Produtos</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: 'Poppins', sans-serif;
            color: #1f2937;
        }

        .card-dark {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-shadow: none;
            padding: 20px;
        }

        .gold-text {
            color: #2563eb;
            font-weight: 600;
        }

        .btn-gold {
            background: #2563eb;
            border: none;
            color: white;
            border-radius: 8px;
            padding: 6px 14px;
            transition: 0.2s;
        }

        .btn-gold:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .form-control {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            color: #111827;
        }

        .form-control:focus {
            border-color: #2563eb;
            box-shadow: none;
        }

        .navbar {
            background: #ffffff !important;
            border-bottom: 1px solid #e5e7eb;
        }

        .navbar .nav-link {
            color: #374151 !important;
        }

        .navbar .nav-link:hover {
            color: #2563eb !important;
        }

        .table-dark-custom {
            background: #ffffff;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: #f3f4f6;
            color: #374151;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        .caros {
            color: #dc2626;
            font-weight: 600;
        }

        a {
            text-decoration: none;
            color: black;
        }

        a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4" style="background-color: #121212; border-bottom: 1px solid #2a2a2a;">
    <div class="container">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav me-auto">
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-light" href="/categorias/novo">📁 Nova Categoria</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-light" href="/usuarios/novo">👤 Novo Usuário</a>
                </li>
            </ul>

            <div class="d-flex gap-2">

                <a  href="/login" class="btn btn-outline-secondary btn-sm">
                    Sair
                </a>

            </div>

        </div>
    </div>
</nav>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4" >
        <a></a>
        <h2 class="gold-text fw-semibold">Lista de Produtos</h2>
        <a sec:authorize="hasRole('ADMIN')" href="/produtos/novo" class="btn btn-gold">+ Novo Produto</a>
        <a sec:authorize="hasRole('USER')"></a>
    </div>

    <form action="/produtos" method="get" class="mb-3 d-flex gap-2">
        <input type="text" name="nome" placeholder="Buscar produto"
               th:value="${busca}" class="form-control"/>
        <button type="submit" class="btn btn-gold">Buscar</button>
    </form>

    <!-- Mensagem caso não encontre nada -->
    <div th:if="${#lists.isEmpty(produtos)}" class="text-center my-3">
        Nenhum produto encontrado.
    </div>
    <div class="card card-dark p-4">
        <div class="table-responsive">
            <table class="table table-dark table-striped table-hover table-dark-custom align-middle text-center">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Categoria</th>
                    <th>Valor</th>
                    <th>Data</th>
                    <th sec:authorize="hasRole('ADMIN')">Ações</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="produto : ${produtos}">

                    <td th:text="${produto.idProduto}"></td>
                    <td th:text="${produto.nome}"></td>

                    <td th:text="${produto.categoria != null ? produto.categoria.nome : 'Sem Categoria'}"></td>

                    <td th:text="'R$ ' + ${#numbers.formatDecimal(produto.valor, 1, 'POINT', 2, 'COMMA')}"
                        th:classappend="${produto.valor.doubleValue() > 1000} ? 'caros' : ''">
                    </td>
                    <td th:text="${#temporals.format(produto.dataCadastro, 'dd/MM/yyyy HH:mm')}"></td>

                    <td sec:authorize="hasRole('ADMIN')">
                        <a class="btn btn-sm btn-gold"
                           th:href="@{/produtos/editar/{id}(id=${produto.idProduto})}">
                            Editar
                        </a>

                        <a class="btn btn-sm btn-gold"
                           th:href="@{/produtos/excluir/{id}(id=${produto.idProduto})}">
                            🗑️
                        </a>
                    </td>

                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
