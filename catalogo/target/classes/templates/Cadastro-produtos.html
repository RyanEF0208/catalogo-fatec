<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Produto</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: 'Poppins', sans-serif;
            color: #1f2937;
        }

        /* CONTAINER CENTRAL */
        .card-dark {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-shadow: none;
            padding: 20px;
        }

        /* TÍTULOS */
        .gold-text {
            color: #2563eb;
            font-weight: 600;
        }

        /* BOTÃO PRINCIPAL */
        .btn-gold {
            background: #2563eb;
            border: none;
            color: white;
            border-radius: 8px;
            padding: 6px 14px;
            transition: 0.2s;
        }

        .btn-gold:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        /* INPUTS */
        .form-control {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            color: #111827;
        }

        .form-control:focus {
            border-color: #2563eb;
            box-shadow: none;
        }

        /* NAVBAR SIMPLES */
        .navbar {
            background: #ffffff !important;
            border-bottom: 1px solid #e5e7eb;
        }

        .navbar .nav-link {
            color: #374151 !important;
        }

        .navbar .nav-link:hover {
            color: #2563eb !important;
        }

        /* TABELA */
        .table-dark-custom {
            background: #ffffff;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: #f3f4f6;
            color: #374151;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        /* PREÇO ALTO */
        .caros {
            color: #dc2626;
            font-weight: 600;
        }

        /* LINKS */
        a {
            text-decoration: none;
        }

        a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-dark p-4">
                <h3 class="text-center gold-text mb-4">Cadastrar Novo Produto</h3>

                <form th:action="@{/produtos/novo}" th:object="${produto}" method="post">

                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text"
                               name="nome"
                               id="nome"
                               class="form-control"
                               placeholder="Digite o nome do produto"
                               required
                               th:field="*{nome}">

                        <span th:if="${#fields.hasErrors('nome')}"
                              th:errors="*{nome}"></span>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoria</label>
                        <select class="form-control" th:field="*{categoria.idCategoria}" required>
                            <option value="">Selecione</option>
                            <option th:each="cat : ${categorias}"
                                    th:value="${cat.idCategoria}"
                                    th:text="${cat.nome}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="valor" class="form-label">Valor</label>
                        <input type="number" step="0.01" name="valor" id="valor" class="form-control" placeholder="Digite o valor do produto"

                               th:field="*{valor}" >

                        <span th:if="${#fields.hasErrors('valor')}"
                              th:errors="*{valor}"></span>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/produtos" class="btn btn-outline-secondary">Cancelar</a>

                        <button type="submit" class="btn btn-gold">Salvar Produto</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
