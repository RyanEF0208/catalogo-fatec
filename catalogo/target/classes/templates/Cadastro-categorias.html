<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Categoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-family: 'Poppins', sans-serif; color: #1f2937; }
        .card-dark { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; margin-top: 50px; }
        .gold-text { color: #2563eb; font-weight: 600; }
        .btn-gold { background: #2563eb; border: none; color: white; border-radius: 8px; padding: 6px 14px; }
        .btn-gold:hover { background: #1d4ed8; }
        .form-control { border-radius: 8px; border: 1px solid #d1d5db; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card card-dark">
                <h3 class="text-center gold-text mb-4">Nova Categoria</h3>

                <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

                <form th:action="@{/categorias/novo}" th:object="${categoria}" method="post">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome da Categoria</label>
                        <input type="text"
                               id="nome"
                               class="form-control"
                               th:field="*{nome}"
                               placeholder="Ex: Eletrônicos"
                               required>
                        <span class="text-danger small" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/produtos" class="btn btn-outline-secondary">Voltar</a>
                        <button type="submit" class="btn btn-gold">Salvar Categoria</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
